<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Results — RABS</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="page-container" style="max-width: 800px;">

        <div class="page-header">
            <div>
                <h1>📤 Upload Student Results</h1>
                <p>Enter and post a student's subject scores below</p>
            </div>
            <button onclick="logout()" class="btn btn-sm" style="background:var(--error-bg); color:var(--error); border:1px solid rgba(239,68,68,0.2);">Logout</button>
        </div>

        <div class="card">
            <div id="uploadMsg"></div>

            <form id="uploadForm" class="auth-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="studentId">Student ID</label>
                        <input type="text" id="studentId" placeholder="RABS-2026-XXXX" required>
                    </div>
                    <div class="form-group">
                        <label for="studentFullName">Full Name</label>
                        <input type="text" id="studentFullName" placeholder="Student's full name" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="term">Term</label>
                        <select id="term" required>
                            <option value="First Term">First Term</option>
                            <option value="Second Term">Second Term</option>
                            <option value="Third Term">Third Term</option>
                        </select>
                    </div>
                </div>

                <div style="margin-top: 2rem; margin-bottom: 2rem; overflow-x: auto;">
                    <table style="width: 100%; border-collapse: collapse; margin-bottom: 1rem; color: var(--text);">
                        <thead>
                            <tr style="border-bottom: 1px solid var(--border); text-align: left;">
                                <th style="padding: 10px;">Subject</th>
                                <th style="padding: 10px; width: 150px;">Test (Max 30)</th>
                                <th style="padding: 10px; width: 150px;">Exam (Max 70)</th>
                                <th style="padding: 10px; width: 80px;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="subjectsBody">
                            <!-- Predefined Subjects injected by JS -->
                        </tbody>
                    </table>
                    <button type="button" id="addRowBtn" style="background: transparent; border: 1px dashed var(--border); color: var(--text-muted); padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; text-align: center;">+ Add Extra Subject</button>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Post Result</button>
            </form>
        </div>

    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/teacherUpload.js"></script>
</body>
</html>
