<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Results — RABS</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="page-container" style="max-width: 620px;">

        <div class="page-header">
            <div>
                <h1>📤 Upload Student Results</h1>
                <p>Enter and post a student's subject scores below</p>
            </div>
            <button onclick="logout()" class="btn btn-sm" style="background:var(--error-bg); color:var(--error); border:1px solid rgba(239,68,68,0.2);">Logout</button>
        </div>

        <div class="card">
            <div id="uploadMsg"></div>

            <form id="uploadForm" class="auth-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="studentId">Student ID</label>
                        <input type="text" id="studentId" placeholder="RABS-2026-XXXX" required>
                    </div>
                    <div class="form-group">
                        <label for="studentFullName">Full Name</label>
                        <input type="text" id="studentFullName" placeholder="Student's full name" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" placeholder="e.g. Mathematics" required>
                    </div>
                    <div class="form-group">
                        <label for="caScore">CA Score <span class="text-muted">(max 40)</span></label>
                        <input type="number" id="caScore" placeholder="0 – 40" min="0" max="40" required>
                    </div>
                    <div class="form-group">
                        <label for="examScore">Exam Score <span class="text-muted">(max 60)</span></label>
                        <input type="number" id="examScore" placeholder="0 – 60" min="0" max="60" required>
                    </div>
                    <div class="form-group full-width">
                        <label for="term">Term</label>
                        <select id="term" required>
                            <option value="First Term">First Term</option>
                            <option value="Second Term">Second Term</option>
                            <option value="Third Term">Third Term</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Post Result</button>
            </form>
        </div>

    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/teacherUpload.js"></script>
</body>
</html>
