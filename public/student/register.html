<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration — RABS</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="icon" type="image/png" href="../favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .photo-upload-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 1.5rem;
            gap: 10px;
        }
        .photo-preview {
            width: 100px;
            height: 120px;
            border-radius: 6px;
            border: 2px dashed var(--border);
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: var(--bg-card);
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .photo-preview:hover { border-color: var(--primary); }
        .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
        .photo-preview .placeholder-icon { font-size: 2rem; color: var(--text-muted); }
        .photo-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
        }
        #photoInput { display: none; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">

            <!-- Registration Form -->
            <div id="formSection">
                <div class="auth-header">
                    <div class="auth-icon">📝</div>
                    <h1>Student Registration</h1>
                    <p>Enter your details to generate your unique Student ID</p>
                </div>

                <form id="regForm" class="auth-form" enctype="multipart/form-data">

                    <!-- Photo Upload -->
                    <div class="photo-upload-wrapper">
                        <div class="photo-preview" id="photoPreview" onclick="document.getElementById('photoInput').click()" title="Click to upload photo">
                            <span class="placeholder-icon"><i class="fa-solid fa-camera"></i></span>
                        </div>
                        <input type="file" id="photoInput" name="photo" accept="image/*">
                        <span class="photo-label">Profile photo <em>(optional — tap to upload)</em></span>
                    </div>

                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" required>
                    </div>

                    <div class="form-group">
                        <label for="className">Class</label>
                        <select id="className" required>
                            <option value="">— Select your Class —</option>
                            <option value="CRECHE">CRECHE</option>
                            <option value="PRE-NURSERY">PRE-NURSERY</option>
                            <option value="NURSERY 1">NURSERY 1</option>
                            <option value="NURSERY 2">NURSERY 2</option>
                            <option value="NURSERY 3">NURSERY 3</option>
                            <option value="BASIC ONE">BASIC ONE</option>
                            <option value="BASIC TWO">BASIC TWO</option>
                            <option value="BASIC THREE">BASIC THREE</option>
                            <option value="BASIC FOUR">BASIC FOUR</option>
                            <option value="BASIC FIVE">BASIC FIVE</option>
                            <option value="JSS1">JSS1</option>
                            <option value="JSS2">JSS2</option>
                            <option value="JSS3">JSS3</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">Register &amp; Generate ID</button>
                </form>

                <p class="auth-footer">Already registered? <a href="login.html">Login here →</a></p>
            </div>

            <!-- Success Result -->
            <div id="resultArea" style="display:none; text-align:center;">
                <div class="auth-icon" style="color: var(--success);">✅</div>
                <h1 style="color: var(--success);">Registration Successful!</h1>
                <p style="margin: 12px 0;">Your unique Student ID is:</p>
                <div class="result-id-box">
                    <span id="displayId"></span>
                </div>
                <p class="text-muted" style="margin: 12px 0;">Save this ID — you'll need it to login and check your results.</p>
                <a href="login.html" class="btn btn-primary btn-full mt-4">Proceed to Login →</a>
            </div>

        </div>
    </div>
    <script src="../js/theme.js"></script>
    <script src="../js/studentRegister.js"></script>
</body>
</html>
