<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — RABS</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">🔐</div>
                <h1>Admin Portal</h1>
                <p>Restricted access — administrators only</p>
            </div>

            <form id="adminLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="staffId">Admin ID</label>
                    <input type="text" id="staffId" placeholder="Enter Admin ID" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Login →</button>
            </form>

            <p class="auth-footer"><a href="../index.html">← Back to Home</a></p>
        </div>
    </div>

    <script src="../js/theme.js"></script>
    <script src="../js/adminLogin.js"></script>
</body>
</html>
